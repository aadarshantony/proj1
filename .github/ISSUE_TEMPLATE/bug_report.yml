name: Bug report
description: Report a reproducible bug
labels: [bug, triage]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect?
    validations: {required: true}
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations: {required: true}
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations: {required: true}
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, browser, etc.
