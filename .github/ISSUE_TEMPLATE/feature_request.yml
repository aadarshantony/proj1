name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this solve?
    validations: {required: true}
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations: {required: true}
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
