<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none" width="100%" height="100%">
  <defs>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="120" result="blur" />
    </filter>
    <clipPath id="rect-clip">
      <rect width="1000" height="1000" />
    </clipPath>
  </defs>

  <rect width="1000" height="1000" fill="#a855f7" />

  <g filter="url(#blur)" clip-path="url(#rect-clip)">
    <circle cx="200" cy="200" r="450" fill="#ec4899" opacity="0.8">
      <animate attributeName="cx" values="200; 800; 200" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cy" values="200; 700; 200" dur="22s" repeatCount="indefinite" />
    </circle>

    <circle cx="800" cy="800" r="550" fill="#c084fc" opacity="0.8">
      <animate attributeName="cx" values="800; 100; 800" dur="18s" repeatCount="indefinite" />
      <animate attributeName="cy" values="800; 200; 800" dur="25s" repeatCount="indefinite" />
    </circle>

    <circle cx="500" cy="500" r="400" fill="#d946ef" opacity="0.7">
      <animate attributeName="cx" values="500; 200; 500" dur="20s" repeatCount="indefinite" />
      <animate attributeName="cy" values="500; 900; 500" dur="17s" repeatCount="indefinite" />
    </circle>
  </g>


</svg>